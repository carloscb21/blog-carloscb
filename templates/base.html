{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Carlos Augusto Champa Bujaico{% endblock %}</title>
    <meta name="description" content="{% block description %}Blog personal y portfolio de Carlos Augusto Champa Bujaico.{% endblock %}">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% include 'includes/header.html' %}

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    {% include 'includes/footer.html' %}
    
    {% block extra_js %}{% endblock %}
</body>
</html>
